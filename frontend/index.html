<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IronHalo — Constitutional Governance Demo</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
      padding: 40px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 260px;
      background: #161b22;
      color: #e6edf3;
      border: 1px solid #30363d;
      padding: 12px;
      font-size: 14px;
      border-radius: 6px;
      resize: vertical;
    }

    button {
      margin-top: 16px;
      padding: 12px 20px;
      background: #238636;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    #result {
      margin-top: 30px;
      padding: 20px;
      border-radius: 6px;
      background: #161b22;
      border: 1px solid #30363d;
      white-space: pre-wrap;
    }

    .allow { border-left: 6px solid #2ea043; }
    .relax { border-left: 6px solid #1f6feb; }
    .deny  { border-left: 6px solid #da3633; }
    .neutral { border-left: 6px solid #8b949e; }

    #loading {
      display: none;
      margin-top: 20px;
      font-style: italic;
    }
  </style>
</head>

<body>
  <h1>IronHalo — Constitutional Governance Demo</h1>
  <p>Paste any cloud config (AWS, Azure, GCP, Kubernetes, etc.). IronHalo will detect misconfig and enforce the clause.</p>

  <form id="config-form">
    <textarea id="config-input" placeholder="Paste your cloud config here..."></textarea>
    <button type="submit">Submit Config to IronHalo</button>
  </form>

  <div id="loading">Analyzing perimeter intent…</div>
  <div id="result"></div>

  <script>
    // --- SANITIZATION FIX ---
    // Removes ANY line containing "override" (case-insensitive)
    function sanitizeConfig(raw) {
      return raw
        .split("\n")
        .filter(line => !line.toLowerCase().includes("override"))
        .join("\n");
    }

    document.getElementById("config-form").addEventListener("submit", async (event) => {
      event.preventDefault();

      const input = document.getElementById("config-input");
      const resultBox = document.getElementById("result");
      const spinner = document.getElementById("loading");

      const rawConfig = input.value;
      const cleanedConfig = sanitizeConfig(rawConfig);

      resultBox.textContent = "";
      resultBox.className = "";
      spinner.style.display = "block";

      try {
        const response = await fetch("/config-strike", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ config: cleanedConfig })
        });

        const data = await response.json();
        spinner.style.display = "none";

        if (data.error) {
          resultBox.textContent = "Error: " + data.error;
          resultBox.className = "deny";
        } else {
          resultBox.textContent = `[Clause ${data.clause}] ${data.ruling}\n\n${data.rationale || ""}`;
          resultBox.className = data.ruling.toLowerCase();
        }
      } catch (err) {
        spinner.style.display = "none";
        resultBox.textContent = "Network error submitting config.";
        resultBox.className = "deny";
      }
    });
  </script>
</body>
</html>
